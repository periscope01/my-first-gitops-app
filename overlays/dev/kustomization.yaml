apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tell Kustomize where to find the core manifests
resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

# We can inline a quick patch to ensure dev only uses 1 replica to save resources
patches:
  - target:
      kind: Deployment
      name: sample-nginx
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
