apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: accpt-

commonLabels:
  environment: acceptance

patches:
  - target:
      kind: Deployment
      name: sample-nginx
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
